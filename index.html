<html lang="pt-BR"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>CRM 2026 · AmorSaúde</title>
<style>
/* Proxima Nova via Bunny Fonts (closest to Nexa, royalty-free) */
@import url('https://fonts.bunny.net/css?family=nunito:400,600,700,800,900|nunito-sans:400,600,700,800,900');

/* Brand-accurate fallback stack: Proxima Nova → Nunito (geometric sans, rounded) */
:root{
  --teal:    #4DC9D2;
  --teal2:   #35BEC8;
  --teal3:   #1DAAB4;
  --red:     #E8352A;
  --white:   #FFFFFF;
  --bg:      #071E20;
  --bg2:     #0B2D31;
  --font:    'Nunito Sans', 'Proxima Nova', 'Nunito', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--font)}

#stage{
  width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#071E20 0%,#0B2D31 55%,#071E20 100%);
  position:relative;overflow:hidden;
}
#stage::before{
  content:'';position:absolute;inset:-40%;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 20% 50%,rgba(77,201,210,.16) 0%,transparent 65%),
    radial-gradient(ellipse 45% 55% at 82% 50%,rgba(77,201,210,.10) 0%,transparent 60%),
    radial-gradient(ellipse 30% 30% at 50% 5%, rgba(232,53,42,.06) 0%,transparent 55%);
  animation:glow 12s ease-in-out infinite alternate;
}
@keyframes glow{0%{transform:translate(0,0)}100%{transform:translate(2%,4%)}}

#scene{position:relative;width:1280px;height:720px;transform-origin:center center;overflow:hidden}

/* ── INTRO ───────────────────── */
#intro{
  position:absolute;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;transition:opacity .8s;
}
#intro.hide{opacity:0;pointer-events:none}

.intro-logo-wrap{
  margin-bottom:32px;
  opacity:0;animation:up .8s .2s forwards;
}
/* The real SVG logo rendered at comfortable size */
.brand-logo{height:56px;width:auto;display:block}
.brand-logo-sm{height:30px;width:auto;display:block}

.intro-eyebrow{
  font-size:11px;font-weight:800;letter-spacing:.3em;text-transform:uppercase;
  color:rgba(255,255,255,.35);margin-bottom:14px;
  opacity:0;animation:up .7s .6s forwards;
}
.intro-title{
  font-size:74px;font-weight:900;line-height:1;text-align:center;
  letter-spacing:-.025em;color:var(--white);
  opacity:0;animation:up .8s .85s forwards;
}
.intro-title .hl{color:var(--teal)}

.intro-rule{
  width:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--red));
  border-radius:2px;margin:24px 0;
  animation:grow 1s 1.4s forwards;
}
@keyframes grow{to{width:220px}}

.intro-sub{
  font-size:15px;color:rgba(255,255,255,.38);font-weight:600;
  opacity:0;animation:up .7s 1.55s forwards;
}
.intro-btn{
  margin-top:34px;
  font-family:var(--font);font-size:12px;font-weight:900;
  letter-spacing:.15em;text-transform:uppercase;
  color:var(--bg);background:var(--teal);
  border:none;cursor:pointer;padding:15px 46px;border-radius:40px;
  box-shadow:0 0 52px rgba(77,201,210,.65);
  opacity:0;animation:up .7s 1.9s forwards;
  transition:transform .2s,box-shadow .2s;
}
.intro-btn:hover{transform:scale(1.05);box-shadow:0 0 76px rgba(77,201,210,.9)}

@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── MAIN ────────────────────── */
#main{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .8s}
#main.show{opacity:1;pointer-events:all}

#topbar{
  position:absolute;top:0;left:0;right:0;height:64px;z-index:30;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 44px;
  background:linear-gradient(180deg,rgba(7,30,32,.98) 0%,transparent 100%);
  border-bottom:1px solid rgba(77,201,210,.1);
}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-sep{width:1px;height:28px;background:rgba(255,255,255,.1);margin:0 12px}
#sec-label{font-size:13px;font-weight:800;color:var(--white)}
#sec-sub{font-size:10px;color:rgba(255,255,255,.35);font-weight:600;margin-top:1px}
.tb-right{display:flex;align-items:center;gap:10px}
#sec-badge{font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;padding:4px 13px;border-radius:20px}
#month-pill{
  font-family:var(--font);font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;
  color:var(--white);background:rgba(77,201,210,.12);border:1.5px solid rgba(77,201,210,.35);
  border-radius:20px;padding:6px 16px;
}

#prog{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.05);z-index:30}
#prog-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--teal),var(--red));
  transition:width .6s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 10px rgba(77,201,210,.5);
}

#controls{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;align-items:center;z-index:30;
}
.cbtn{
  font-family:var(--font);font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.5);background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);padding:7px 16px;border-radius:20px;
  cursor:pointer;transition:all .2s;
}
.cbtn:hover{background:rgba(255,255,255,.1);color:#fff}
.cbtn.primary{background:var(--teal);border-color:transparent;color:var(--bg);font-weight:900;box-shadow:0 0 16px rgba(77,201,210,.4)}
#snum{font-family:var(--font);font-size:10px;color:rgba(255,255,255,.22);min-width:42px;text-align:center}
#obj-lbl{
  position:absolute;bottom:46px;left:0;right:0;text-align:center;
  font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.18);
}

/* ── CALENDAR ───────────────── */
#cal-stage{
  position:absolute;left:44px;top:50%;transform:translateY(-50%);
  perspective:1000px;z-index:10;
}
#cal{
  width:290px;border-radius:18px;
  background:rgba(255,255,255,.03);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.07);
  overflow:hidden;
  transform:rotateY(20deg) rotateX(7deg);
  box-shadow:-18px 26px 60px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.09);
  animation:float 5s ease-in-out infinite;
  opacity:0;transition:opacity .7s .4s;
}
#cal.vis{opacity:1}
@keyframes float{
  0%,100%{transform:rotateY(20deg) rotateX(7deg) translateY(0)}
  50%{transform:rotateY(15deg) rotateX(4deg) translateY(-9px)}
}
#cal::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.08) 0%,transparent 50%);
  border-radius:18px;pointer-events:none;
}

.ch{
  padding:18px 20px 14px;
  background:linear-gradient(135deg,var(--teal) 0%,var(--teal3) 100%);
  position:relative;
}
/* mini brand logo inside calendar header */
.ch-logo{height:18px;width:auto;margin-bottom:8px;display:block;opacity:.85}
.ch-mn{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.01em}
.ch-yr{font-size:11px;color:rgba(255,255,255,.6);font-weight:700;margin-top:2px}
.ch::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:rgba(255,255,255,.18)}

.cw{display:grid;grid-template-columns:repeat(7,1fr);padding:10px 12px 5px}
.cwd{text-align:center;font-size:9px;font-weight:800;color:rgba(255,255,255,.28);letter-spacing:.06em;text-transform:uppercase}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:3px 9px 14px}
.cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);border-radius:7px;position:relative}
.cd.dot::after{content:'';position:absolute;bottom:2px;width:4px;height:4px;border-radius:50%}
.cd.dr::after{background:var(--red);box-shadow:0 0 5px var(--red)}
.cd.dt::after{background:var(--teal);box-shadow:0 0 5px var(--teal)}
.cd.done{background:rgba(232,53,42,.18);color:#FF9580;font-weight:800;border:1px solid rgba(232,53,42,.35);box-shadow:0 0 8px rgba(232,53,42,.2)}

/* ── CARDS ──────────────────── */
#cards{
  position:absolute;right:36px;top:50%;transform:translateY(-50%);
  width:740px;display:flex;flex-direction:column;gap:8px;z-index:10;
}

.card{
  border-radius:12px;padding:10px 14px 10px 16px;
  display:flex;align-items:flex-start;gap:12px;
  position:relative;overflow:hidden;
  border:1px solid rgba(255,255,255,.06);
  opacity:0;transform:scale(.87);
  transition:opacity .5s cubic-bezier(.34,1.56,.64,1),transform .5s cubic-bezier(.34,1.56,.64,1);
}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.05) 0%,transparent 60%);pointer-events:none}
.card.vis{opacity:1;transform:scale(1)}

.bar{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:34px}

.c-done{background:rgba(232,53,42,.1);border-color:rgba(232,53,42,.22)}
.c-done .bar{background:var(--red);box-shadow:0 0 10px rgba(232,53,42,.5)}
.c-dev{background:rgba(77,201,210,.08);border-color:rgba(77,201,210,.2)}
.c-dev .bar{background:var(--teal);box-shadow:0 0 10px rgba(77,201,210,.4)}
.c-nao{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08)}
.c-nao .bar{background:rgba(255,255,255,.18)}
.c-none{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.04)}
.c-none .bar{background:rgba(255,255,255,.07)}

.cbody{flex:1;min-width:0}
.caction{
  font-size:13px;font-weight:800;line-height:1.3;margin-bottom:5px;
  font-family:var(--font);
}
.c-done .caction{color:rgba(255,200,190,.9)}
.c-dev  .caction{color:rgba(210,248,252,.92)}
.c-nao  .caction{color:rgba(255,255,255,.44)}
.c-none .caction{color:rgba(255,255,255,.2);font-style:italic}

.cmeta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:4px}

/* KR pill — turquesa */
.kr{font-size:9px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;
    padding:2px 8px;border-radius:20px;
    background:rgba(77,201,210,.14);color:var(--teal);border:1px solid rgba(77,201,210,.32)}
/* Director — vermelho */
.dir{font-size:9px;font-weight:900;letter-spacing:.03em;
     padding:2px 9px;border-radius:20px;
     background:rgba(232,53,42,.14);color:#FF9580;border:1px solid rgba(232,53,42,.28);
     display:flex;align-items:center;gap:3px}
.dir::before{content:"";display:inline-block;width:6px;height:6px;background:var(--red);border-radius:50%}
/* Priority */
.badge{font-size:9px;font-weight:900;padding:2px 8px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase}
.bp0{background:rgba(232,53,42,.22);color:#FF9580;border:1px solid rgba(232,53,42,.38)}
.bp1{background:rgba(255,150,60,.18);color:#FFBB80;border:1px solid rgba(255,150,60,.32)}
.bp2{background:rgba(77,201,210,.15);color:var(--teal);border:1px solid rgba(77,201,210,.32)}
.bp3{background:rgba(255,255,255,.07);color:rgba(255,255,255,.38);border:1px solid rgba(255,255,255,.12)}
/* Squad */
.sq{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:5px;padding:2px 7px}
.fr{font-size:9px;color:rgba(255,255,255,.2);font-style:italic;font-weight:600}
/* Status pill */
.sp{font-size:9px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;padding:4px 11px;border-radius:20px;white-space:nowrap;flex-shrink:0;align-self:flex-start;margin-top:1px}
.sp-done{background:var(--red);color:#fff;box-shadow:0 0 12px rgba(232,53,42,.4)}
.sp-dev{background:rgba(77,201,210,.18);color:var(--teal);border:1.5px solid rgba(77,201,210,.45)}
.sp-nao{background:rgba(255,255,255,.05);color:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.1)}
.sp-none{background:transparent;color:rgba(255,255,255,.16)}

#ov{position:absolute;inset:0;background:var(--bg);opacity:0;pointer-events:none;z-index:25;transition:opacity .3s}
#ov.f{opacity:1}
</style>
</head>

  for(let i=1;i<=sl.mDays;i++){
    const d=document.createElement("div");d.className="cd";d.textContent=i;
    const dot=sl.dots.find(x=>x.d===i);
    if(dot){dot.c==="done"?d.classList.add("done","dot","dr"):d.classList.add("dot",dot.c)}
    g.appendChild(d);
  }
}

function buildCards(sl){
  const a=document.getElementById("cards");a.innerHTML="";
  sl.cards.forEach((c,i)=>{
    const el=document.createElement("div");
    const cc=CM[c.st]||"c-none";const sp=SM[c.st]||SM.none;
    el.className=`card ${cc}`;el.style.transitionDelay=`${90+i*130}ms`;
    let m=`<span class="kr">${c.kr}</span><span class="dir">${c.dir}</span>`;
    if(c.badge&&c.bc)m+=`<span class="badge ${c.bc}">${c.badge}</span>`;
    if(c.sq)m+=`<span class="sq">${c.sq}</span>`;
    if(c.fr)m+=`<span class="fr">${c.fr}</span>`;
    el.innerHTML=`<div class="bar"></div><div class="cbody"><div class="caction">${c.a}</div><div class="cmeta">${m}</div></div><span class="sp ${sp.cls}">${sp.txt}</span>`;
    a.appendChild(el);
    requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add("vis")));
  });
}

let cur=0,auto=true,timer=null;
function render(idx){
  const s=SLIDES[idx];
  document.getElementById("month-pill").textContent=s.month+" 2026";
  const b=document.getElementById("sec-badge");
  b.textContent=s.sec.code;
  Object.assign(b.style,{background:s.sec.bg,color:s.sec.color,fontWeight:"900",fontSize:"10px",letterSpacing:".1em",padding:"4px 13px",borderRadius:"20px"});
  document.getElementById("sec-label").textContent=s.sec.label;
  document.getElementById("sec-sub").textContent=s.sec.sub;
  document.getElementById("obj-lbl").textContent=s.obj;
  buildCal(s);document.getElementById("cal").classList.add("vis");buildCards(s);
  document.getElementById("prog-fill").style.width=((idx+1)/SLIDES.length*100)+"%";
  document.getElementById("snum").textContent=`${idx+1} / ${SLIDES.length}`;
}
function goTo(idx){
  if(idx<0)idx=SLIDES.length-1;if(idx>=SLIDES.length)idx=0;cur=idx;
  const ov=document.getElementById("ov");ov.classList.add("f");
  setTimeout(()=>{render(cur);ov.classList.remove("f");},300);
  if(auto)resetAuto();
}
function resetAuto(){clearInterval(timer);timer=setInterval(()=>goTo(cur+1),5500)}
document.getElementById("btn-start").addEventListener("click",()=>{
  document.getElementById("intro").classList.add("hide");
  setTimeout(()=>{document.getElementById("main").classList.add("show");render(0);resetAuto();},500);
});
document.getElementById("btn-next").addEventListener("click",()=>goTo(cur+1));
document.getElementById("btn-prev").addEventListener("click",()=>goTo(cur-1));
document.getElementById("btn-auto").addEventListener("click",()=>{
  auto=!auto;
  document.getElementById("btn-auto").textContent=auto?"⏸ Pausar":"▶ Auto";
  if(auto)resetAuto();else clearInterval(timer);
});
</script>

</body></html>
